<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontopress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      background: #ffffff;
    }
    #splash-screen {
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .splash-content {
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .splash-content img {
      width: 280px;
      height: auto;
      opacity: 0;
      transform: scale(0.9);
      animation: fadeScaleIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes fadeScaleIn {
      to { opacity: 1; transform: scale(1); }
    }
    .light-streak {
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0) 30%,
        rgba(255,255,255,0.6) 45%,
        rgba(255,255,255,0.95) 50%,
        rgba(255,255,255,0.6) 55%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 3;
      opacity: 0;
    }
    .light-streak.active {
      animation: streakSweep 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes streakSweep {
      0% { left: -60%; opacity: 0; }
      20% { opacity: 1; }
      100% { left: 120%; opacity: 0; }
    }
    .footer-text {
      position: absolute;
      bottom: 36px;
      font-size: 12px;
      font-weight: 400;
      color: #94a3b8;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .version-tag {
      position: absolute;
      top: 36px;
      font-size: 11px;
      font-weight: 500;
      color: #cbd5e1;
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <div class="light-streak" id="light-streak"></div>
    <span class="version-tag">v1.0.0</span>
    <div class="splash-content">
      <img src="/images/splash.png" alt="Kontopress" />
    </div>
    <div class="footer-text">By PR3NC2</div>
  </div>
  <script>
    (function () {
      const splash = document.getElementById('splash-screen');
      const streak = document.getElementById('light-streak');
      setTimeout(() => { streak.classList.add('active'); }, 1800);
      setTimeout(() => { splash.classList.add('hidden'); }, 2600);
    })();
  </script>
</body>
</html>
